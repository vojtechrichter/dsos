[unstable]
bindeps = true
# build-std intentionally omitted: as of cargo 1.95.0-nightly (2026-02-24) the
# combination of `bindeps` with `build-std` triggers an internal cargo panic
# in unit_dependencies.rs. `x86_64-unknown-none` is a tier-2 target with
# precompiled `core`/`compiler_builtins`, so build-std isn't required to build
# the kernel — `rustup target add x86_64-unknown-none` is enough.
